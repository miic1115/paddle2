<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>巴克斯 CrossFit 報名系統</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.300.0"
      }
    }
  </script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    input, select { -webkit-appearance: none; }
    
    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.95) translateY(5px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    .animate-pop-in { animation: popIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  </style>
</head>
<body class="bg-[#151716] text-white font-sans antialiased selection:bg-emerald-500/30">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      Activity, Users, CheckCircle2, X, MapPin, 
      CircleDollarSign, CalendarCheck, Ban, Check, Save, 
      PlusCircle, AlertTriangle, Loader2, RefreshCcw, ChevronDown
    } from 'lucide-react';

    // ⚠️ 請填入您最新的 CF_API_URL 網址 ⚠️
    const CF_API_URL = "https://script.google.com/macros/s/AKfycbyc1uH7mRXpMY0RrsHKPqQO-KYhM06WL0b5_DP-B8oiFI-4JfWJ6q0qhIqn9lGL0Z84/exec";
    const LIFF_ID = "2009058776-fDhQPTf4"; // 您的 LIFF ID (可選)

    const App = () => {
      // 🌟 新增常數：設定報名人數上限，方便未來修改
      const MAX_ATTENDEES = 15;

      // 系統與身分狀態
      const [isLoading, setIsLoading] = useState(true);
      const [sysError, setSysError] = useState(null);
      const [currentUser, setCurrentUser] = useState(null);
      const [allMembers, setAllMembers] = useState([]); // 給無 LIFF 時測試切換用
      
      // 介面控制
      const [activeTab, setActiveTab] = useState('board'); // 'board' | 'admin'
      const [toast, setToast] = useState(null);
      const [isUserMenuOpen, setIsUserMenuOpen] = useState(false); // 控制下拉選單狀態

      // CF 資料狀態
      const [cfData, setCfData] = useState([]);
      const [selectedCfMonth, setSelectedCfMonth] = useState(null);
      const [cfSharedPackageStatus, setCfSharedPackageStatus] = useState({});
      
      const [hasUnsavedChanges, setHasUnsavedChanges] = useState(false);
      const [isSaving, setIsSaving] = useState(false);

      // 後台新增活動表單狀態
      const [newClass, setNewClass] = useState({ month: new Date().getMonth() + 1, date: '', time: '', fee: true });
      const [isAddingClass, setIsAddingClass] = useState(false);

      const showToast = (msg) => {
        setToast(msg);
        setTimeout(() => setToast(null), 3000);
      };

      // 核心資料載入 API (包含登入與拉資料)
      const loadInitialData = async (testName = null) => {
        setIsLoading(true);
        setSysError(null);
        try {
          let lineId = "MOCK_USER_ID";
          
          if (!testName && LIFF_ID && window.liff) {
            await window.liff.init({ liffId: LIFF_ID });
            if (window.liff.isLoggedIn()) {
              const profile = await window.liff.getProfile();
              lineId = profile.userId;
            }
          }

          const res = await fetch(CF_API_URL, {
            method: 'POST',
            redirect: 'follow',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action: 'initData', lineId: lineId, testName: testName })
          });
          
          const text = await res.text();
          if (text.includes("<html")) {
            setSysError("API 權限錯誤，請檢查 GAS 部署權限。"); return;
          }

          const data = JSON.parse(text);
          if (data.success) {
            setAllMembers(data.allMembers || []);
            
            if (data.user) {
              setCurrentUser(data.user);
              setCfData(data.cfData || []);
              
              if (data.cfData && data.cfData.length > 0) {
                // 自動選取最近的月份 (或預設第一個)
                setSelectedCfMonth(data.cfData[0].month);
              }
              
              const newSharedStatus = {};
              (data.cfData || []).forEach(m => {
                newSharedStatus[m.month] = m.isShared || false;
              });
              setCfSharedPackageStatus(newSharedStatus);
              setHasUnsavedChanges(false);
            } else {
              // 找不到此 LINE ID 綁定
              setCurrentUser(null);
            }
          } else {
            setSysError("載入失敗：" + data.error);
          }
        } catch(e) { 
          setSysError("無法連線至伺服器：" + e.message);
        } finally {
          setIsLoading(false);
        }
      };

      useEffect(() => { loadInitialData(); }, []);

      // ----------------- CF 費用與邏輯運算 -----------------
      const currentMonthData = useMemo(() => {
        return cfData.find(m => m.month === selectedCfMonth) || { classes: [], isPaid: false };
      }, [cfData, selectedCfMonth]);

      const myClassesThisMonth = useMemo(() => {
        if (!currentUser) return [];
        return currentMonthData.classes.filter(cls => (cls.attendees || []).includes(currentUser.name));
      }, [currentMonthData, currentUser]);

      const { unitPrice, totalCost, isEffectivelyShared, isFullMonthSelf } = useMemo(() => {
        const myFeeClassCount = myClassesThisMonth.filter(c => c.fee).length;
        const totalFeeClassesThisMonth = currentMonthData.classes.filter(c => c.fee).length;
        
        const isFullMonthSelf = (myFeeClassCount === totalFeeClassesThisMonth && totalFeeClassesThisMonth > 0);
        const isUserDeclaredShared = cfSharedPackageStatus[selectedCfMonth] || false;
        
        const isEffectivelyShared = isFullMonthSelf || isUserDeclaredShared;
        const unitPrice = isEffectivelyShared ? 250 : 300;
        const totalCost = myFeeClassCount * unitPrice;

        return { unitPrice, totalCost, isEffectivelyShared, isFullMonthSelf };
      }, [myClassesThisMonth, currentMonthData.classes, cfSharedPackageStatus, selectedCfMonth]);

      const toggleSharedStatus = () => {
        if (currentMonthData.isPaid || isFullMonthSelf) return; 
        setCfSharedPackageStatus(prev => ({ ...prev, [selectedCfMonth]: !prev[selectedCfMonth] }));
        setHasUnsavedChanges(true);
      };

      const toggleAttendance = (classId) => {
        if (currentMonthData.isPaid) return; 
        setCfData(prevData => prevData.map(m => {
          if (m.month !== selectedCfMonth) return m;
          return {
            ...m,
            classes: m.classes.map(cls => {
              if (cls.id === classId) {
                const attendees = cls.attendees || [];
                const isAttending = attendees.includes(currentUser.name);
                // 🌟 修改：使用 MAX_ATTENDEES 判斷報名人數是否已滿
                if (!isAttending && attendees.length >= MAX_ATTENDEES) return cls;

                return {
                  ...cls,
                  attendees: isAttending 
                    ? attendees.filter(name => name !== currentUser.name)
                    : [...attendees, currentUser.name]
                };
              }
              return cls;
            })
          }
        }));
        setHasUnsavedChanges(true);
      };

      const handleSave = async () => {
        setIsSaving(true);
        try {
          const attendingIds = myClassesThisMonth.map(cls => cls.id);
          const response = await fetch(CF_API_URL, {
            method: 'POST',
            redirect: 'follow',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({
              action: "saveCFChanges",
              userName: currentUser.name,
              month: selectedCfMonth,
              attendingClassIds: attendingIds,
              isShared: isEffectivelyShared
            })
          });
          const text = await response.text();
          const result = JSON.parse(text);

          if (result.success) {
            setHasUnsavedChanges(false);
            showToast("報名變更已儲存！");
            await loadInitialData(currentUser.name);
          } else {
            alert("儲存失敗：" + result.error);
          }
        } catch (err) {
          alert("連線儲存失敗，請檢查網路");
        } finally {
          setIsSaving(false);
        }
      };

      // ----------------- 新增活動邏輯 (後台) -----------------
      const handleAddClass = async (e) => {
        e.preventDefault();
        if (!newClass.month || !newClass.time) { alert("請填寫必填欄位"); return; }
        
        setIsAddingClass(true);
        try {
          const response = await fetch(CF_API_URL, {
            method: 'POST',
            redirect: 'follow',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action: "addClass", ...newClass })
          });
          const result = await JSON.parse(await response.text());
          if (result.success) {
            showToast("課程新增成功！");
            setNewClass({ ...newClass, date: '', time: '', fee: true }); // 重置欄位並預設為需收費
            await loadInitialData(currentUser.name); // 重新讀取資料更新畫面
            setActiveTab('board'); // 切回看板
          } else {
            alert("新增失敗：" + result.error);
          }
        } catch (err) { alert("連線失敗"); } 
        finally { setIsAddingClass(false); }
      };


      // --- 畫面渲染 ---
      if (isLoading) return (
        <div className="min-h-screen flex flex-col items-center justify-center space-y-4">
          <Loader2 className="w-10 h-10 text-emerald-500 animate-spin" />
          <p className="text-emerald-500/80 font-bold tracking-widest animate-pulse">連線至 CF 訓練基地...</p>
        </div>
      );

      if (sysError) return (
        <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center">
          <AlertTriangle className="w-16 h-16 text-yellow-500 mb-4" />
          <p className="text-gray-400 mb-6">{sysError}</p>
          <button onClick={() => loadInitialData()} className="px-6 py-2 bg-emerald-500 text-black rounded-lg font-bold">重新載入</button>
        </div>
      );

      // 身分選擇器 (如果不在 LINE 裡面，方便測試)
      if (!currentUser) return (
        <div className="min-h-screen flex items-center justify-center p-6">
          <div className="w-full max-w-sm bg-[#171C1A] border border-emerald-900/50 rounded-2xl p-8 shadow-2xl">
            <h1 className="text-xl font-bold mb-2 text-center text-emerald-400">CF 系統測試登入</h1>
            <p className="text-xs text-gray-500 text-center mb-6">目前未偵測到 LINE 登入，請選擇測試身分</p>
            <div className="space-y-2 max-h-64 overflow-y-auto pr-2 no-scrollbar">
              {allMembers.map(name => (
                <button 
                  key={name} onClick={() => loadInitialData(name)}
                  className="w-full p-4 bg-[#0d1f18] hover:bg-emerald-500 hover:text-black transition-colors rounded-xl text-left font-bold"
                >
                  {name}
                </button>
              ))}
            </div>
          </div>
        </div>
      );

      return (
        <div className="min-h-screen font-sans pb-32">
          {/* 導覽列 */}
          <nav className="sticky top-0 z-40 bg-[#0D1210]/95 backdrop-blur-md border-b border-emerald-900/30 h-16 flex items-center justify-between px-4">
            <div className="flex bg-[#0d1f18] p-1 rounded-xl">
              <button onClick={() => setActiveTab('board')} className={`px-4 py-2 rounded-lg font-bold text-xs transition-colors ${activeTab === 'board' ? 'bg-emerald-500 text-[#0a1a12]' : 'text-gray-500'}`}>報名看板</button>
              <button onClick={() => setActiveTab('admin')} className={`px-4 py-2 rounded-lg font-bold text-xs transition-colors ${activeTab === 'admin' ? 'bg-emerald-500 text-[#0a1a12]' : 'text-gray-500'}`}>新增活動</button>
            </div>
            
            <div className="relative text-right ml-4 shrink-0">
              <div 
                className="cursor-pointer group" 
                onClick={() => setIsUserMenuOpen(!isUserMenuOpen)} 
                title="點擊切換身分"
              >
                <div className="text-[10px] text-emerald-500 font-bold uppercase flex items-center justify-end gap-1 group-hover:text-emerald-400">
                  User <ChevronDown className={`w-3 h-3 transition-transform duration-200 ${isUserMenuOpen ? 'rotate-180' : ''}`} />
                </div>
                <div className="text-sm font-bold group-hover:text-gray-300 transition-colors">{currentUser.name}</div>
              </div>
              
              {/* 下拉選單與背景遮罩 */}
              {isUserMenuOpen && (
                <>
                  <div className="fixed inset-0 z-40" onClick={() => setIsUserMenuOpen(false)}></div>
                  <div className="absolute right-0 mt-2 w-40 bg-[#171C1A] border border-emerald-900/50 rounded-xl shadow-2xl z-50 overflow-hidden max-h-64 overflow-y-auto no-scrollbar py-1 animate-in fade-in slide-in-from-top-2 duration-200">
                    {allMembers.map(name => (
                      <button 
                        key={name}
                        onClick={() => {
                          setIsUserMenuOpen(false);
                          loadInitialData(name);
                        }}
                        className={`w-full text-left px-4 py-3 text-sm font-bold transition-colors ${
                          currentUser.name === name 
                            ? 'text-emerald-400 bg-emerald-500/10' 
                            : 'text-gray-300 hover:bg-[#0d1f18] hover:text-emerald-500'
                        }`}
                      >
                        {name}
                      </button>
                    ))}
                  </div>
                </>
              )}
            </div>
          </nav>

          <main className="max-w-4xl mx-auto px-4 py-6">
            
            {/* --- Tab 1: 報名看板 --- */}
            {activeTab === 'board' && (
              <div className="animate-in fade-in duration-300">
                
                {/* CF 資訊卡片 */}
                <div className="bg-gradient-to-br from-[#171C1A] to-[#0d1f18] p-5 rounded-2xl border border-emerald-900/40 mb-6 shadow-lg">
                  <div className="flex items-center gap-4 mb-4">
                    <div className="w-12 h-12 rounded-xl bg-emerald-500/20 border border-emerald-500/50 flex items-center justify-center shrink-0">
                      <Activity className="w-6 h-6 text-emerald-400" />
                    </div>
                    <div>
                      <h2 className="text-lg font-black text-white">CrossFit 體能訓練</h2>
                      <p className="text-xs text-emerald-500/80 font-bold mt-0.5">提升肌耐力與爆發力，水上表現更升級</p>
                    </div>
                  </div>
                  <div className="space-y-2.5 bg-[#0D1210]/50 p-3.5 rounded-xl border border-emerald-900/30 text-xs text-gray-300">
                    <div className="flex items-start gap-2.5">
                      <MapPin className="w-4 h-4 text-emerald-500 shrink-0 mt-0.5" />
                      <span className="leading-relaxed"><strong className="text-white">地點：</strong>巴克斯 (10442臺北市中山區長安東路一段75號B1)</span>
                    </div>
                    <div className="flex items-start gap-2.5">
                      <CircleDollarSign className="w-4 h-4 text-emerald-500 shrink-0 mt-0.5" />
                      <span className="leading-relaxed"><strong className="text-white">費用：</strong>單堂報名 300 / 整月報名 250 (乘以當月上課次數)。若兩人分擔該月課程，亦享有包月價 250/堂。</span>
                    </div>
                  </div>
                </div>

                {/* 月份選擇器 */}
                <div className="flex gap-3 mb-2 overflow-x-auto no-scrollbar pb-4 pt-1 px-1 -mx-1">
                  {(cfData || []).map(m => (
                    <button 
                      key={m.month} 
                      onClick={() => setSelectedCfMonth(m.month)}
                      className={`px-6 py-2.5 rounded-full text-sm font-bold whitespace-nowrap border transition-all duration-300 ${
                        selectedCfMonth === m.month 
                        ? 'bg-emerald-500 text-[#0a1a12] border-emerald-400 shadow-[0_0_15px_rgba(16,185,129,0.4)] transform scale-105' 
                        : 'bg-[#171C1A] text-gray-400 border-emerald-900/30 hover:text-emerald-500 hover:border-emerald-500/50'
                      }`}
                    >
                      {m.month} 月
                    </button>
                  ))}
                </div>

                {/* 個人當月狀況面板 */}
                {cfData && cfData.length > 0 && (
                  <div className="bg-[#262A28] border border-[#3C423F] rounded-2xl p-5 mb-8 shadow-md relative overflow-hidden">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center border-b border-[#3C423F] pb-4 mb-4 gap-4">
                      <div className="flex-1">
                        <div className="flex items-center gap-2 mb-2">
                          <CalendarCheck className="w-5 h-5 text-emerald-500" />
                          <h3 className="font-bold text-white text-sm tracking-wide">我 {selectedCfMonth} 月的報名狀況</h3>
                        </div>
                        <div className="flex flex-wrap gap-2 min-h-[28px]">
                          {myClassesThisMonth && myClassesThisMonth.length > 0 ? (
                            myClassesThisMonth.map(cls => (
                              <span key={cls.id} className="text-xs bg-[#1A1D1C] text-emerald-400 border border-emerald-900/50 px-2.5 py-1.5 rounded-md font-bold shadow-sm">
                                {cls.date && String(cls.date) !== 'Nule' ? String(cls.date).split(' ')[0] : cls.time}
                              </span>
                            ))
                          ) : (
                            <span className="text-xs text-gray-500 italic flex items-center">尚未報名本月課程</span>
                          )}
                        </div>
                      </div>
                      
                      <div className="text-sm text-gray-400 whitespace-nowrap pt-2 md:pt-0">
                        已報名 <span className="text-emerald-400 font-bold text-lg mx-1">{(myClassesThisMonth || []).length}</span> 項
                      </div>
                    </div>

                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center bg-[#1C1F1E] rounded-xl p-4 border border-[#2D3330]">
                      <div 
                        onClick={toggleSharedStatus}
                        className={`flex items-center gap-3 group transition-opacity ${
                          (isFullMonthSelf || currentMonthData?.isPaid) ? 'opacity-50 cursor-not-allowed' : 'cursor-pointer'
                        }`}
                      >
                        <button type="button" className={`w-4 h-4 rounded-sm flex items-center justify-center shrink-0 transition-colors ${isEffectivelyShared ? 'bg-emerald-500 border-emerald-500' : 'bg-[#151716] border-gray-500 border'}`}>
                          {isEffectivelyShared && <Check className="w-3 h-3 text-[#0a1a12]" strokeWidth={3} />}
                        </button>
                        <span className="text-xs text-gray-300 group-hover:text-white select-none">
                          我有與其他隊友湊包月課程 (享 250元/堂 優惠)
                        </span>
                      </div>
                      
                      <div className="flex items-center gap-3 mt-3 md:mt-0 w-full md:w-auto justify-between md:justify-end">
                        <span className="text-xs text-gray-500 font-medium">
                          {(myClassesThisMonth || []).filter(c => c.fee).length} 堂 × ${unitPrice}
                        </span>
                        <div className="text-sm font-bold text-gray-300 flex items-center">
                          本月應繳：
                          <span className={`ml-1 text-xl font-black tracking-wide ${currentMonthData?.isPaid ? 'line-through text-gray-500' : 'text-emerald-500'}`}>
                            ${totalCost}
                          </span>
                          {currentMonthData?.isPaid && (
                            <span className="ml-2 text-[10px] bg-emerald-500/20 text-emerald-400 px-2 py-0.5 rounded border border-emerald-500/30 tracking-widest">
                              已對帳
                            </span>
                          )}
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                {/* 課程列表 */}
                <div className="space-y-4">
                  {(!cfData || cfData.length === 0) && (
                     <div className="text-center text-gray-500 py-10 bg-[#171C1A] rounded-2xl border border-dashed border-emerald-900/30">目前無任何資料，請至「新增活動」建立！</div>
                  )}
                  
                  {(currentMonthData?.classes || []).map((cls, index) => {
                    const attendees = cls.attendees || [];
                    const isAttending = attendees.includes(currentUser?.name);
                    
                    // 🌟 修改：使用 MAX_ATTENDEES 判斷是否額滿
                    const isFull = attendees.length >= MAX_ATTENDEES; 
                    const isLocked = currentMonthData.isPaid;
                    const canJoin = (!isLocked) && (isAttending || !isFull);
                    
                    return (
                      <div key={cls.id} className={`border rounded-2xl overflow-hidden animate-pop-in shadow-sm transition-colors ${isAttending ? 'bg-[#0d1f18]/80 border-emerald-500/40' : 'bg-[#171C1A] border-emerald-900/20'}`} style={{ animationDelay: `${index * 0.05}s` }}>
                        <div className="p-4 flex items-center justify-between">
                          <div className="flex items-center gap-4">
                            {(!cls.date || String(cls.date) === 'Nule') ? (
                               <div className="w-12 h-12 rounded-xl flex items-center justify-center bg-[#0d1f18] border border-emerald-900/30 text-emerald-500"><CalendarCheck className="w-5 h-5"/></div>
                            ) : (
                               <div className="w-12 h-12 rounded-xl flex flex-col items-center justify-center bg-[#0d1f18] border border-emerald-900/30">
                                 <span className="text-xs text-emerald-500 font-bold">{String(cls.date).split(' ')[0]}</span>
                                 {String(cls.date).split(' ')[1] && <span className="text-[10px] text-gray-500">{String(cls.date).split(' ')[1]}</span>}
                               </div>
                            )}
                            <div>
                              <div className="font-bold text-base mb-0.5 flex items-center gap-2">
                                {cls.time ? String(cls.time) : ''}
                              </div>
                              <div className="text-xs text-gray-400 flex items-center gap-1">
                                <Users className="w-3.5 h-3.5" />
                                {/* 🌟 修改：顯示字串從 / 12 人改為 / {MAX_ATTENDEES} 人 */}
                                <span>已報名: <strong className={`ml-1 ${isFull ? 'text-red-400' : 'text-emerald-400'}`}>{attendees.length}</strong> / {MAX_ATTENDEES} 人</span>
                              </div>
                            </div>
                          </div>

                          <div onClick={() => { if (canJoin) toggleAttendance(cls.id); }} className={`flex items-center gap-3 ${canJoin ? 'cursor-pointer active:scale-95 transition-transform' : 'opacity-40 cursor-not-allowed'}`}>
                            {!canJoin && !isAttending && !isLocked && <span className="text-xs font-bold text-red-400 bg-red-500/10 px-2 py-1 rounded">已額滿</span>}
                            {isLocked && <span className="text-xs font-bold text-gray-500">已結算</span>}
                            {canJoin && (
                              <div className={`flex items-center w-14 h-8 rounded-full p-1 transition-colors ${isAttending ? 'bg-emerald-500' : 'bg-[#3C423F]'}`}>
                                <div className={`w-6 h-6 bg-white rounded-full shadow-md transform transition-transform duration-300 ${isAttending ? 'translate-x-6' : 'translate-x-0'}`} />
                              </div>
                            )}
                          </div>
                        </div>

                        <div className="bg-[#0D1210]/60 px-4 py-3 border-t border-emerald-900/20">
                          {attendees.length > 0 ? (
                            <div className="flex flex-wrap gap-2">
                              {attendees.map(name => (
                                <span key={name} className={`text-[11px] px-2.5 py-1 rounded-md font-bold transition-all ${name === currentUser?.name ? 'bg-emerald-500 text-[#0a1a12] shadow-sm' : 'bg-[#171C1A] text-gray-400 border border-emerald-900/40'}`}>
                                  {name}
                                </span>
                              ))}
                            </div>
                          ) : (
                            <div className="text-[11px] text-gray-600 font-medium italic">目前尚無人報名，趕快搶頭香！</div>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* --- Tab 2: 新增活動 (管理員) --- */}
            {activeTab === 'admin' && (
              <div className="animate-in fade-in slide-in-from-right duration-300">
                <div className="bg-[#171C1A] border border-emerald-900/40 rounded-2xl p-6 shadow-xl">
                  <div className="flex items-center gap-2 mb-6 border-b border-emerald-900/30 pb-4">
                    <PlusCircle className="w-6 h-6 text-emerald-400" />
                    <h2 className="text-lg font-black">建立新活動 / 課程</h2>
                  </div>

                  <form onSubmit={handleAddClass} className="space-y-5">
                    <div className="grid grid-cols-2 gap-4">
                      <div>
                        <label className="block text-xs font-bold text-gray-400 mb-2">所屬月份 *</label>
                        <div className="relative">
                          <select 
                            required 
                            value={newClass.month} 
                            onChange={e => setNewClass({...newClass, month: Number(e.target.value)})} 
                            className="w-full bg-[#0D1210] border border-emerald-900/50 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-500 transition-colors"
                          >
                            {Array.from({ length: 12 }, (_, i) => i + 1).map(m => (
                              <option key={m} value={m}>{m} 月</option>
                            ))}
                          </select>
                          <ChevronDown className="absolute right-4 top-3.5 w-5 h-5 text-emerald-500/50 pointer-events-none" />
                        </div>
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-gray-400 mb-2">日期標籤</label>
                        <input type="text" placeholder="例如: 4/12 Wed (免填可留空)" value={newClass.date} onChange={e => setNewClass({...newClass, date: e.target.value})} className="w-full bg-[#0D1210] border border-emerald-900/50 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-500 transition-colors placeholder:text-gray-700" />
                      </div>
                    </div>

                    <div>
                      <label className="block text-xs font-bold text-gray-400 mb-2">時間或活動標題 *</label>
                      <input type="text" required placeholder="例如: 20:00 - 21:00 或 CF 參賽意願" value={newClass.time} onChange={e => setNewClass({...newClass, time: e.target.value})} className="w-full bg-[#0D1210] border border-emerald-900/50 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-500 transition-colors placeholder:text-gray-700" />
                    </div>

                    <div 
                      onClick={() => setNewClass({...newClass, fee: !newClass.fee})} 
                      className="flex items-center gap-3 p-4 bg-[#0D1210] border border-emerald-900/30 rounded-xl cursor-pointer group"
                    >
                      <button 
                        type="button" 
                        className={`w-5 h-5 rounded flex items-center justify-center shrink-0 transition-colors ${!newClass.fee ? 'bg-emerald-500 border-emerald-500' : 'bg-[#151716] border-gray-600 border group-hover:border-emerald-500/50'}`}
                      >
                        {!newClass.fee && <Check className="w-3.5 h-3.5 text-[#0a1a12]" strokeWidth={3} />}
                      </button>
                      <span className="text-sm font-bold text-gray-200 select-none">此活動不納入系統計費 (例如：比賽報名)</span>
                    </div>

                    <button type="submit" disabled={isAddingClass} className="w-full py-4 mt-4 bg-emerald-500 hover:bg-emerald-400 text-[#0a1a12] rounded-xl font-black shadow-lg disabled:opacity-50 transition-all active:scale-95 flex items-center justify-center gap-2">
                      {isAddingClass ? <Loader2 className="w-5 h-5 animate-spin" /> : <PlusCircle className="w-5 h-5" />}
                      確認新增寫入資料庫
                    </button>
                  </form>
                </div>
              </div>
            )}

          </main>

          {/* 浮動儲存按鈕 */}
          {activeTab === 'board' && (
            <div className="fixed bottom-8 left-0 right-0 px-6 z-50 flex justify-center pointer-events-none">
              <button 
                onClick={handleSave} 
                disabled={isSaving || !hasUnsavedChanges} 
                className={`w-full max-w-sm flex items-center justify-center gap-3 px-8 py-4 rounded-2xl font-black shadow-2xl transition-all duration-300 pointer-events-auto ${
                  hasUnsavedChanges ? 'bg-emerald-500 hover:bg-emerald-400 text-[#0a1a12] active:scale-95 translate-y-0 opacity-100' : 'bg-gray-800 text-gray-500 translate-y-4 opacity-0 hidden'
                }`}
              >
                {isSaving ? <div className="w-5 h-5 border-2 border-[#0a1a12]/30 border-t-[#0a1a12] rounded-full animate-spin" /> : <Save className="w-5 h-5" />}
                儲存我的 CF 報名
              </button>
            </div>
          )}
          
          {toast && <div className="fixed top-24 left-1/2 -translate-x-1/2 bg-emerald-500 text-[#0a1a12] px-6 py-3 rounded-full font-bold shadow-2xl flex items-center gap-2 animate-in slide-in-from-top-4 z-[100]"><CheckCircle2 className="w-4 h-4" />{toast}</div>}
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
